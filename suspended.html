<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Suspended</title>
  <link rel="stylesheet" href="styles/suspended.css">
</head>
<body>
  <div class="container">
    <div class="icon">💤</div>
    <h1>Tab Suspended</h1>
    <p class="subtitle">This tab was suspended to save memory</p>
    
    <div class="tab-info">
      <img id="favicon" src="" alt="" class="favicon">
      <div class="details">
        <h2 id="pageTitle">Loading...</h2>
        <p id="pageUrl" class="url"></p>
      </div>
    </div>
    
    <button id="restoreBtn" class="restore-btn">Restore Tab</button>
    
    <p class="info">💡 Memory saved: ~50 MB</p>
  </div>
  
  <script src="suspended.js"></script>
</body>
</html>
